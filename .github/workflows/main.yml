name: Repost Bot Comments with @jules

on:
  pull_request_review:
    types: [submitted]

jobs:
  repost-comment:
    runs-on: ubuntu-latest
    # Added deepsource-io[bot] to the list of allowed bots
    if: |
      contains(fromJSON('["gemini-code-assist[bot]", "chatgpt-codex-connector[bot]", "coderabbitai[bot]", "qodo-code-review[bot]", "copilot", "deepsource-io[bot]"]'), github.actor)
    steps:
      - name: Quote and bundle review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }} 
          script: |
            const reviewId = context.payload.review.id;
            const issueNumber = context.payload.pull_request.number;
            const author = context.payload.review.user.login;
            const reviewBody = context.payload.review.body || '';
            
            // Fetch all inline comments tied to this specific review submission
            const { data: comments } = await github.rest.pulls.listCommentsForReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber,
              review_id: reviewId
            });
            
            let digest = '';
            
            // Add the main review summary if one exists
            if (reviewBody.trim()) {
              digest += `**Review Summary:**\n> ${reviewBody.split('\n').join('\n> ')}\n\n`;
            }
            
            // Append each inline comment and turn the file path into a clickable link
            if (comments.length > 0) {
              digest += `**Inline Code Suggestions:**\n`;
              comments.forEach(c => {
                digest += `*On [\`${c.path}\`](${c.html_url}):*\n> ${c.body.split('\n').join('\n> ')}\n\n`;
              });
            }
            
            // Skip posting if the review was just a blank approval with no comments
            if (!digest.trim()) {
              console.log("Empty review body and no inline comments. Skipping.");
              return;
            }
            
            const finalComment = `${digest}—@${author}\n\n@jules`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: finalComment
            });
