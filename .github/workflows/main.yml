name: Repost Bot Comments with @jules

on:
  pull_request_review:
    types: [submitted]

jobs:
  repost-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Quote and bundle review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const actor = context.actor;
            const reviewUser = context.payload.review && context.payload.review.user && context.payload.review.user.login;

            // Allowed bot names
            const allowed = [
              "gemini-code-assist[bot]",
              "chatgpt-codex-connector[bot]",
              "coderabbitai[bot]",
              "qodo-code-review[bot]",
              "copilot",
              "Copilot",
              "copilot[bot]",
              "github-copilot",
              "github-copilot[bot]",
              "github-copilot-preview[bot]",
              "copilot-pull-request-reviewer[bot]",
              "copilot-pull-request-reviewer[AI]",
              "Copilot[AI]",
              "copilot[AI]",
              "deepsource-io[bot]"
            ];

            if (!allowed.includes(actor) && !allowed.includes(reviewUser)) {
              console.log(`Skipping: neither actor (${actor}) nor review author (${reviewUser}) is in allowed list.`);
              return;
            }

            const reviewId = context.payload.review && context.payload.review.id;
            const issueNumber = context.payload.pull_request && context.payload.pull_request.number;

            if (!reviewId || !issueNumber) {
              console.log("Missing review id or pull request number; skipping.");
              return;
            }

            const author = reviewUser || actor;
            const reviewBody = context.payload.review.body || '';

            const { data: comments } = await github.rest.pulls.listCommentsForReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber,
              review_id: reviewId
            });

            let digest = '';

            if (reviewBody.trim()) {
              digest += `**Review Summary:**\n> ${reviewBody.split('\n').join('\n> ')}\n\n`;
            }

            if (comments.length > 0) {
              digest += `**Inline Code Suggestions:**\n`;
              comments.forEach(c => {
                digest += `*On [\`${c.path}\`](${c.html_url}):*\n> ${c.body.split('\n').join('\n> ')}\n\n`;
              });
            }

            if (!digest.trim()) {
              console.log("Empty review body and no inline comments. Skipping.");
              return;
            }

            const finalComment = `${digest}—*${author}*\n\n@jules please address this review`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: finalComment
            });
