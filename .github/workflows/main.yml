name: Repost Bot Comments with @jules

on:
  issue_comments:
    types: [created]

jobs:
  repost-comment:
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON('["gemini-code-assist[bot]", "coderabbitai[bot]", "chatgpt-codex-connector[bot]"]'), github.actor) &&
      github.event.issue.pull_request != null
    steps:
      - name: Quote and repost comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const author = context.payload.comment.user.login;
            const issueNumber = context.issue.number;
            
            const quotedComment = `> ${comment.split('\n').join('\n> ')}\n\n—@${author}\n\n@jules`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: quotedComment
            });
